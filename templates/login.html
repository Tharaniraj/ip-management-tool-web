<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — IP Management Tool</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep:   #020817;
            --blue:      #3b82f6;
            --blue-l:    #60a5fa;
            --purple:    #8b5cf6;
            --green:     #10b981;
            --text:      #e2e8f0;
            --muted:     #94a3b8;
            --dimmed:    #3d5268;
            --border:    rgba(96,165,250,0.18);
            --red:       #ef4444;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            overflow: hidden;
        }

        /* ── Animated background ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 80% 70% at 15% 20%, rgba(59,130,246,0.18) 0%, transparent 55%),
                radial-gradient(ellipse 65% 75% at 85% 80%, rgba(139,92,246,0.15) 0%, transparent 55%),
                radial-gradient(ellipse 55% 45% at 55% 50%, rgba(6,182,212,0.07) 0%, transparent 65%),
                linear-gradient(155deg, #020817 0%, #050d22 50%, #030a1a 100%);
            animation: bgPulse 14s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0%   { transform: scale(1); }
            100% { transform: scale(1.05) translate(-1%, 1%); }
        }

        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
            background-size: 56px 56px;
            mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 20%, transparent 100%);
            -webkit-mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 20%, transparent 100%);
        }

        .orb { position: fixed; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; animation: orbDrift linear infinite; }
        .orb-1 { width:480px;height:480px; background:radial-gradient(circle,rgba(59,130,246,0.5),transparent); top:-150px;left:-150px; animation-duration:22s; opacity:.3; }
        .orb-2 { width:400px;height:400px; background:radial-gradient(circle,rgba(139,92,246,0.5),transparent); bottom:-120px;right:-120px; animation-duration:28s;animation-direction:reverse; opacity:.28; }
        .orb-3 { width:250px;height:250px; background:radial-gradient(circle,rgba(6,182,212,0.55),transparent); top:38%;left:60%; animation-duration:35s; opacity:.2; }

        @keyframes orbDrift {
            0%   { transform: translate(0,0) rotate(0deg); }
            25%  { transform: translate(40px,-35px) rotate(90deg); }
            50%  { transform: translate(15px,55px) rotate(180deg); }
            75%  { transform: translate(-40px,20px) rotate(270deg); }
            100% { transform: translate(0,0) rotate(360deg); }
        }

        /* ── Card ── */
        .page {
            position: relative; z-index: 1;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }

        .login-card {
            background: rgba(8,16,38,0.88);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(59,130,246,0.2);
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%; max-width: 400px;
            box-shadow:
                0 30px 90px rgba(0,0,0,0.7),
                0 0 0 1px rgba(255,255,255,0.04),
                0 0 70px rgba(59,130,246,0.08),
                inset 0 1px 0 rgba(255,255,255,0.06);
            position: relative;
            animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
        }

        @keyframes cardIn {
            from { transform: translateY(40px) scale(0.92); opacity: 0; }
            to   { transform: translateY(0) scale(1); opacity: 1; }
        }

        /* top glow line */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(59,130,246,0.8), rgba(139,92,246,0.6), transparent);
            border-radius: 1px;
        }

        .logo {
            text-align: center;
            margin-bottom: 34px;
        }

        .logo-icon-wrap {
            width: 62px; height: 62px;
            background: linear-gradient(135deg, #1d4ed8 0%, #7c3aed 100%);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 26px; color: white;
            box-shadow:
                0 8px 32px rgba(59,130,246,0.5),
                0 0 0 1px rgba(96,165,250,0.3),
                inset 0 1px 0 rgba(255,255,255,0.25);
        }

        .logo h1 {
            font-size: 21px; font-weight: 700;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.4px;
            margin-bottom: 5px;
        }

        .logo p {
            font-size: 12px; color: var(--dimmed);
            letter-spacing: 0.6px; text-transform: uppercase; font-weight: 500;
        }

        .error-alert {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.35);
            color: #fca5a5;
            border-radius: 10px;
            padding: 11px 16px;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex; align-items: center; gap: 9px;
        }

        .form-group { margin-bottom: 18px; }

        .form-group label {
            display: block;
            font-size: 11px; font-weight: 700;
            color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.6px;
            margin-bottom: 7px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap i {
            position: absolute;
            left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--dimmed); font-size: 13px;
            pointer-events: none;
            transition: color 0.2s;
        }

        .input-wrap input {
            width: 100%;
            padding: 11px 14px 11px 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-size: 14px; font-family: inherit;
            transition: all 0.2s;
        }

        .input-wrap input::placeholder { color: var(--dimmed); }

        .input-wrap input:focus {
            outline: none;
            border-color: var(--blue);
            background: rgba(59,130,246,0.08);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.13), 0 0 22px rgba(59,130,246,0.1);
        }

        .input-wrap input:focus + i,
        .input-wrap:focus-within i { color: var(--blue-l); }

        /* fix icon order - icon after input in DOM but visually left */
        .input-wrap { display: flex; align-items: center; }
        .input-wrap input { order: 1; }
        .input-wrap i { order: 0; position: absolute; }

        .btn-login {
            width: 100%; margin-top: 6px;
            padding: 13px;
            background: linear-gradient(160deg, #1d4ed8 0%, #3b82f6 55%, #60a5fa 100%);
            color: white; border: none;
            border-radius: 10px;
            font-size: 15px; font-weight: 700; font-family: inherit;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
            box-shadow:
                0 6px 22px rgba(59,130,246,0.45),
                0 2px 6px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            position: relative; overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.15), transparent);
            border-radius: 10px 10px 0 0;
            pointer-events: none;
        }

        .btn-login:hover {
            background: linear-gradient(160deg, #3b82f6 0%, #60a5fa 100%);
            box-shadow: 0 8px 30px rgba(59,130,246,0.6), 0 2px 8px rgba(0,0,0,0.4);
            transform: translateY(-2px);
        }

        .btn-login:active {
            transform: scale(0.97) translateY(1px);
            box-shadow: 0 4px 14px rgba(59,130,246,0.4);
        }

        .hint {
            text-align: center;
            margin-top: 22px;
            font-size: 12px; color: var(--dimmed);
        }

        .hint code {
            background: rgba(59,130,246,0.1);
            color: var(--blue-l);
            padding: 1px 7px; border-radius: 5px;
            font-size: 12px;
            border: 1px solid rgba(59,130,246,0.2);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.3); border-radius: 3px; }
    </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="page">
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon-wrap">
                <i class="fa-solid fa-network-wired"></i>
            </div>
            <h1>IP Management Tool</h1>
            <p>Network Address Manager</p>
        </div>

        {% if error %}
        <div class="error-alert">
            <i class="fa-solid fa-circle-exclamation"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>Username</label>
                <div class="input-wrap">
                    <input type="text" name="username"
                           placeholder="Enter username"
                           autocomplete="username" required autofocus>
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrap">
                    <input type="password" name="password"
                           placeholder="Enter password"
                           autocomplete="current-password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
            </div>
            <button type="submit" class="btn-login">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
    </div>
</div>

</body>
</html>
